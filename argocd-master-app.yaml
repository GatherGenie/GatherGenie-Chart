apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gathergenie-master
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/GatherGenie/GatherGenie-Chart.git'
    targetRevision: main
    path: argocd-apps
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
