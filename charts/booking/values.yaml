namespace: team3-ns

service:
  type: ClusterIP
  port: 8003
  targetPort: 8003
containerPort: 8003
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
probes:
  startup:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 10
config:
  port: 8003
  dbHost: postgres-db
  dbPort: 5432
  dbName: booking_db
  eventsServiceUrl: http://events-service:8002
  rabbitmqHost: rabbitmq
  rabbitmqPort: 5672
secret:
  dbUser: admin
  dbPassword: adminpass
  rabbitmqUser: guest
  rabbitmqPassword: guest