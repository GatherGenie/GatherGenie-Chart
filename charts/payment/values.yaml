namespace: team3-ns

replicaCount: 3

service:
  type: ClusterIP
  port: 8004

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

config:
  PORT: "8004"
  DB_HOST: "postgres-db"
  DB_PORT: "5432"
  DB_NAME: "payment_db"
  BOOKING_SERVICE_URL: "http://booking-service:8003"
  TICKET_SERVICE_URL: "http://ticket-service:8005"

secret:
  DB_USER: "admin"
  DB_PASSWORD: "adminpass"

probes:
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
  liveness:
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 10