
service:
  type: ClusterIP
  port: 8005

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

postgres:
  image: "postgres:15"
  storage: 1Gi
  port: 5432
  dbName: "ticket_db"
  username: "user"
  password: "password"
  url: "postgresql://user:password@postgres-db:5432/ticket_db"

config:
  
  notification_service_url: "http://notification-service:8006"