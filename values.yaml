global:
  namespace: team3-ns
  imagePullPolicy: IfNotPresent

  domain: api.gathergenie.in

  resources:
    defaultRequests:
      cpu: 100m
      memory: 128Mi
    defaultLimits:
      cpu: 500m
      memory: 512Mi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpu: 70

admin:
  enabled: true
  replicaCount: 1
  image:
    repository: team3kubectl/admin-service
    tag: v1.0.0

ai:
  enabled: true
  replicaCount: 1
  image:
    repository: team3kubectl/ai-service
    tag: v1.0.0

booking:
  enabled: true
  replicaCount: 1
  image:
    repository: team3kubectl/booking-service
    tag: v1.0.0

events:
  enabled: true
  replicaCount: 1
  image:
    repository: team3kubectl/events-service
    tag: v1.0.0

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: team3kubectl/frontend
    tag: v1.0.0
  
notification:
  enabled: true
  replicaCount: 1
  image:
    repository: team3kubectl/notification-service
    tag: v1.0.0

payment:
  enabled: true
  replicaCount: 1
  image:
    repository: team3kubectl/payment-microservice
    tag: v1.0.0

ticket:
  enabled: true
  replicaCount: 1
  image:
    repository: team3kubectl/ticket-service
    tag: v1.0.0

users:
  enabled: true
  replicaCount: 1
  image:
    repository: team3kubectl/users-service
    tag: v1.0.0